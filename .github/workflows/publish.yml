name: Publish to NuGet

on:
  release:
    types: [published]   # trigger: create a release on GitHub

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.x
            10.x

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Echo resolved package version
        run: echo "Resolved VERSION=${{ steps.version.outputs.VERSION }}"

      - name: Restore & Build
        run: |
          dotnet tool restore
          dotnet restore dotnet-ai.sln
          dotnet build dotnet-ai.sln -c Release --no-restore

      - name: Test
        run: dotnet test dotnet-ai.sln -c Release --no-build

      - name: Security gate - vulnerable packages
        run: |
          dotnet list dotnet-ai.sln package --vulnerable --include-transitive --format json > vulnerabilities.json
          python - <<'PY'
          import json
          import sys

          with open("vulnerabilities.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          projects = data.get("projects", [])
          vulnerable = []

          for project in projects:
              path = project.get("path", "unknown")
              frameworks = project.get("frameworks", [])
              for framework in frameworks:
                  for package in framework.get("topLevelPackages", []):
                      for vuln in package.get("vulnerabilities", []):
                          vulnerable.append((path, framework.get("framework", "unknown"), package.get("id", "unknown"), package.get("resolvedVersion", "unknown"), vuln.get("severity", "unknown"), vuln.get("advisoryurl", "")))
                  for package in framework.get("transitivePackages", []):
                      for vuln in package.get("vulnerabilities", []):
                          vulnerable.append((path, framework.get("framework", "unknown"), package.get("id", "unknown"), package.get("resolvedVersion", "unknown"), vuln.get("severity", "unknown"), vuln.get("advisoryurl", "")))

          if vulnerable:
              print("Vulnerable packages detected:")
              for entry in vulnerable:
                  print(f"- project={entry[0]} framework={entry[1]} package={entry[2]} version={entry[3]} severity={entry[4]} advisory={entry[5]}")
              sys.exit(1)

          print("No vulnerable packages detected.")
          PY

      - name: Pack
        run: dotnet pack src/DotnetAI/DotnetAI.csproj -c Release --no-build -p:Version="${{ steps.version.outputs.VERSION }}" --output ./nupkg

      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p ./artifacts/sbom
          dotnet tool run dotnet-CycloneDX dotnet-ai.sln \
            -o ./artifacts/sbom \
            -F Json \
            -fn bom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: ./artifacts/sbom/bom.cdx.json

      - name: Validate NuGet Trusted Publishing configuration
        env:
          NUGET_USER: ${{ secrets.NUGET_USER }}
        run: |
          if [ -z "${NUGET_USER}" ]; then
            echo "Missing required secret: NUGET_USER (nuget.org profile name, not email)."
            exit 1
          fi

      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate
