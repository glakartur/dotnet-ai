name: Publish to NuGet

on:
  release:
    types: [published]   # trigger: create a release on GitHub

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore & Build
        run: |
          dotnet restore dotnet-ai.sln
          dotnet build dotnet-ai.sln -c Release --no-restore

      - name: Test
        run: dotnet test dotnet-ai.sln -c Release --no-build

      - name: Pack
        run: dotnet pack src/DotnetAi/DotnetAi.csproj -c Release --no-build \
               /p:Version=${{ steps.version.outputs.VERSION }} \
               -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg \
               --api-key ${{ secrets.NUGET_API_KEY }} \
               --source https://api.nuget.org/v3/index.json \
               --skip-duplicate
