name: Publish to NuGet

on:
  release:
    types: [published]   # trigger: create a release on GitHub

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.x
            10.x

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore & Build
        run: |
          dotnet tool restore
          dotnet restore dotnet-ai.sln
          dotnet build dotnet-ai.sln -c Release --no-restore

      - name: Test
        run: dotnet test dotnet-ai.sln -c Release --no-build

      - name: Pack
        run: dotnet pack src/DotnetAI/DotnetAI.csproj -c Release --no-build \
               /p:Version=${{ steps.version.outputs.VERSION }} \
               -o ./nupkg

      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p ./artifacts/sbom
          dotnet tool run dotnet-CycloneDX dotnet-ai.sln \
            -o ./artifacts/sbom \
            -F Json \
            -fn bom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: ./artifacts/sbom/bom.cdx.json

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg \
               --api-key ${{ secrets.NUGET_API_KEY }} \
               --source https://api.nuget.org/v3/index.json \
               --skip-duplicate
